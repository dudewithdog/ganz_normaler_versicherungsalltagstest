<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mein ganz normaler Alltagstest</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#FAF2DC;--navy:#3C4A63;--gold:#C8A96E;
  --gray:#6B7280;--light:#F0E8D0;--border:#D4C9A8;
  --green:#2A6A4A;--red:#7A2C2C;
}
body{background:var(--cream);font-family:'Lato',sans-serif;color:var(--navy);min-height:100vh}
.wrapper{max-width:640px;margin:0 auto;padding:40px 20px 80px}

.header{text-align:center;margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid var(--border)}
.series-label{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
.main-title{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:700;line-height:1.15;margin-bottom:6px}
.main-subtitle{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:17px;color:var(--gray)}

/* Pills */
.pills-label{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--gray);margin:0 0 10px}
.pills{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px}
.pill{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;border:1.5px solid var(--border);background:transparent;color:var(--gray);cursor:pointer;transition:all 0.2s}
.pill:hover{border-color:var(--navy);color:var(--navy)}
.pill.active{background:var(--navy);color:var(--cream);border-color:var(--navy)}
.pill.done{border-color:var(--green);color:var(--green)}
.pill.done.active{background:var(--green);color:white;border-color:var(--green)}

/* Stapel-Info */
.stack-info{font-size:12px;color:var(--gray);margin-bottom:16px}
.stack-info span{font-weight:700;color:var(--navy)}

/* Karte */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideOut{to{opacity:0;transform:translateX(80px)}}
@keyframes slideBack{to{opacity:0;transform:translateX(-80px)}}

.flashcard-wrap{perspective:1200px;width:100%;min-height:240px;cursor:pointer;margin-bottom:20px;animation:fadeUp 0.35s ease both}
.flashcard-inner{position:relative;width:100%;min-height:240px;transform-style:preserve-3d;transition:transform 0.5s cubic-bezier(.23,1,.32,1)}
.flashcard-inner.flipped{transform:rotateY(180deg)}
.face{position:absolute;inset:0;border-radius:14px;backface-visibility:hidden;-webkit-backface-visibility:hidden;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:32px 28px;text-align:center}
.face-front{background:var(--navy);color:var(--cream);box-shadow:0 6px 24px rgba(28,43,74,0.2)}
.face-back{background:var(--light);border:1.5px solid var(--border);transform:rotateY(180deg);box-shadow:0 4px 16px rgba(0,0,0,0.08)}
.card-label{font-size:9px;letter-spacing:0.18em;text-transform:uppercase;opacity:0.45;margin-bottom:14px}
.card-q{font-family:'Cormorant Garamond',serif;font-size:23px;font-weight:600;line-height:1.4}
.card-a{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:600;line-height:1.4;color:var(--navy)}
.card-hint{font-size:11px;opacity:0.35;margin-top:18px;letter-spacing:0.04em}

/* Buttons */
.btn-row{display:flex;gap:12px;margin-bottom:32px}
.btn-wrong{flex:1;padding:14px;border-radius:8px;font-size:12px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;background:transparent;border:1.5px solid var(--red);color:var(--red)}
.btn-wrong:hover{background:var(--red);color:white}
.btn-right{flex:1;padding:14px;border-radius:8px;font-size:12px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;background:var(--green);color:white;border:none}
.btn-right:hover{opacity:0.85}
.btn-flip{width:100%;padding:14px;border-radius:8px;font-size:12px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;background:var(--navy);color:var(--cream);border:none;margin-bottom:20px}

/* Fertig-Screen */
.done-screen{text-align:center;padding:40px 20px;animation:fadeUp 0.4s ease both}
.done-title{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:700;margin-bottom:12px}
.done-sub{font-size:14px;color:var(--gray);margin-bottom:28px;line-height:1.6}
.btn-restart{padding:14px 32px;background:var(--navy);color:var(--cream);border:none;border-radius:8px;font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer}

/* Print */
@media print{
  @page{margin:15mm 18mm;size:A4}
  body{background:white;color:black}
  .pills,.pills-label,.stack-info,.flashcard-wrap,.btn-row,.btn-flip,.done-screen{display:none!important}
  .wrapper{max-width:100%;padding:0}
  .header{border-bottom:1pt solid #ccc;padding-bottom:8pt;margin-bottom:16pt;text-align:left}
  .main-title{font-size:20pt}
  .main-subtitle{font-size:11pt;color:#555}
  .print-content{display:block!important}
  .print-ch{page-break-inside:avoid;margin-bottom:18pt}
  .print-ch-title{font-size:13pt;font-weight:bold;border-bottom:0.5pt solid #ccc;padding-bottom:3pt;margin-bottom:8pt}
  .print-card{margin-bottom:8pt;padding:6pt 8pt;border:0.5pt solid #ddd;border-radius:2pt}
  .pq{font-size:10pt;font-weight:600;margin-bottom:2pt}
  .pa{font-size:9pt;color:#444}
}
</style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <div class="series-label">Ganz normales Alltagswissen · Versicherungen</div>
    <h1 class="main-title">Mein ganz normaler<br>Alltagstest</h1>
    <p class="main-subtitle">Karte aufdecken – gewusst oder nicht?</p>
  </div>

  <div class="pills-label">Kapitel wählen</div>
  <div class="pills" id="pills"></div>
  <div class="stack-info" id="stackInfo"></div>
  <div id="cardArea"></div>

  <div class="print-content" style="display:none" id="printContent"></div>
  <div style="margin-top:40px;padding-top:20px;border-top:1px solid var(--border)">
    <button style="padding:11px 22px;background:var(--navy);color:var(--cream);border:none;border-radius:6px;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer" onclick="window.print()">Drucken</button>
  </div>
</div>

<script>
const ALL = [
  {ch:"Krankenkasse – Grundversicherung", q:"Ist die Grundversicherung in der Schweiz freiwillig?", a:"Nein – sie ist für alle obligatorisch. Jede Person muss eine haben."},
  {ch:"Krankenkasse – Grundversicherung", q:"Bieten alle Krankenkassen in der Grundversicherung das Gleiche?", a:"Ja – die Leistungen sind gesetzlich festgelegt. Nur die Prämie unterscheidet sich."},
  {ch:"Krankenkasse – Grundversicherung", q:"Was ist die Prämienverbilligung?", a:"Staatliche Unterstützung an die Prämie bei tiefem Einkommen – du musst sie beantragen."},

  {ch:"Franchise & Selbstbehalt", q:"Was ist die Franchise?", a:"Der Betrag, den du pro Jahr selbst zahlst, bevor die Kasse etwas übernimmt."},
  {ch:"Franchise & Selbstbehalt", q:"Was bringt eine hohe Franchise?", a:"Eine tiefere Prämie – aber im Krankheitsfall zahlst du mehr selbst."},
  {ch:"Franchise & Selbstbehalt", q:"Was ist der Selbstbehalt?", a:"10% der Kosten über der Franchise – maximal 700 Franken pro Jahr."},

  {ch:"Zusatzversicherung", q:"Ist die Zusatzversicherung obligatorisch?", a:"Nein – sie ist freiwillig und läuft nach anderen Regeln als die Grundversicherung."},
  {ch:"Zusatzversicherung", q:"Kann dich eine Kasse bei der Zusatzversicherung ablehnen?", a:"Ja – sie darf eine Gesundheitsprüfung machen und Nein sagen."},
  {ch:"Zusatzversicherung", q:"Was deckt eine Zusatzversicherung typischerweise?", a:"Leistungen über die Grundversicherung hinaus – etwa Brille, Zahn oder freie Spitalwahl."},

  {ch:"Krankenkasse wechseln", q:"Kannst du die Grundversicherung jedes Jahr wechseln?", a:"Ja – meist auf Ende Jahr. Die Kündigung muss Ende November bei der Kasse sein."},
  {ch:"Krankenkasse wechseln", q:"Lohnt sich ein Wechsel überhaupt?", a:"Oft ja – die Leistung ist gleich, aber die Prämien unterscheiden sich stark."},
  {ch:"Krankenkasse wechseln", q:"Darf dich eine neue Kasse bei der Grundversicherung ablehnen?", a:"Nein – in der Grundversicherung gilt Aufnahmepflicht für alle."},

  {ch:"Unfallversicherung", q:"Wer ist über den Arbeitgeber gegen Unfall versichert?", a:"Wer mindestens 8 Stunden pro Woche beim gleichen Arbeitgeber arbeitet."},
  {ch:"Unfallversicherung", q:"Was kannst du tun, wenn du über den Arbeitgeber unfallversichert bist?", a:"Den Unfall-Einschluss bei der Krankenkasse sistieren – das spart Prämie."},
  {ch:"Unfallversicherung", q:"Bist du als Studentin oder Arbeitslose automatisch unfallversichert?", a:"Nein – dann muss der Unfall über die Krankenkasse gedeckt sein."},

  {ch:"Privathaftpflicht", q:"Ist die Privathaftpflicht obligatorisch?", a:"Nein – aber sie gehört zu den wichtigsten Versicherungen überhaupt."},
  {ch:"Privathaftpflicht", q:"Was deckt die Privathaftpflicht?", a:"Schäden, die du anderen zufügst – an Personen oder fremdem Eigentum."},
  {ch:"Privathaftpflicht", q:"Du zerkratzt aus Versehen das Auto eines Fremden. Wer zahlt?", a:"Deine Privathaftpflicht – sofern du eine hast."},

  {ch:"Hausratversicherung", q:"Was versichert die Hausratversicherung?", a:"Dein Eigentum zu Hause – gegen Feuer, Wasser und Diebstahl."},
  {ch:"Hausratversicherung", q:"Was ist der Unterschied zwischen Hausrat und Haftpflicht?", a:"Hausrat schützt dein Eigentum. Haftpflicht zahlt Schäden, die du anderen zufügst."},
  {ch:"Hausratversicherung", q:"Was bedeutet Neuwert in der Hausratversicherung?", a:"Ersetzt wird, was ein neues, gleichwertiges Objekt heute kostet."},

  {ch:"Motorfahrzeugversicherung", q:"Welche Autoversicherung ist obligatorisch?", a:"Die Haftpflicht – ohne sie bekommst du keine Nummernschilder."},
  {ch:"Motorfahrzeugversicherung", q:"Was ist der Unterschied zwischen Teil- und Vollkasko?", a:"Teilkasko deckt etwa Diebstahl und Hagel. Vollkasko zusätzlich selbstverschuldete Schäden."},
  {ch:"Motorfahrzeugversicherung", q:"Was ist der Selbstbehalt bei der Kasko?", a:"Der Anteil, den du bei einem Schaden selbst trägst."},

  {ch:"Rechtsschutzversicherung", q:"Was übernimmt die Rechtsschutzversicherung?", a:"Anwalts-, Gerichts- und Verfahrenskosten bei rechtlichen Streitigkeiten."},
  {ch:"Rechtsschutzversicherung", q:"Wann ist Rechtsschutz besonders nützlich?", a:"Bei Streit mit Arbeitgeber, Vermieter oder nach einem Verkehrsunfall."},

  {ch:"Reiseversicherung", q:"Was deckt eine Annullierungsversicherung?", a:"Die Kosten, wenn du eine gebuchte Reise nicht antreten kannst."},
  {ch:"Reiseversicherung", q:"Was ist eine Reise-Assistance?", a:"Hilfe im Notfall im Ausland – etwa Rücktransport bei Krankheit oder Unfall."},

  {ch:"Über- & Unterversicherung", q:"Was ist Unterversicherung?", a:"Die Versicherungssumme ist tiefer als der echte Wert – im Schaden gibt es weniger."},
  {ch:"Über- & Unterversicherung", q:"Was ist Überversicherung?", a:"Du zahlst für eine zu hohe Summe – bekommst im Schaden aber nie mehr als den echten Wert."},
  {ch:"Über- & Unterversicherung", q:"Was ist eine Doppelversicherung?", a:"Dasselbe Risiko bei zwei Versicherern – du zahlst doppelt, kassierst aber nicht doppelt."},

  {ch:"Im Schadenfall", q:"Was ist im Schadenfall das Wichtigste?", a:"Sofort melden, ehrlich sein und alles dokumentieren."},
  {ch:"Im Schadenfall", q:"Was passiert bei Versicherungsbetrug?", a:"Die Leistung entfällt – und es ist strafbar."},
  {ch:"Im Schadenfall", q:"Warum solltest du einen Schaden fotografieren?", a:"Fotos sind Beweis und beschleunigen die Abwicklung."},

  {ch:"Versicherung mit Köpfchen", q:"Brauchst du jede angebotene Versicherung?", a:"Nein – versichere, was dich finanziell ruinieren könnte, nicht jede Kleinigkeit."},
  {ch:"Versicherung mit Köpfchen", q:"Welche Regel hilft bei der Wahl einer Versicherung?", a:"Grosse, existenzielle Risiken versichern – kleine selbst tragen."},
  {ch:"Versicherung mit Köpfchen", q:"Was ist beim Vergleich von Offerten entscheidend?", a:"Nicht nur die Prämie – auch Deckung, Selbstbehalt und Ausschlüsse."},
];

const CHAPTERS = [...new Set(ALL.map(c=>c.ch))];
let curChapter = CHAPTERS[0];
let stack = [];      // noch zu lernen
let done = [];       // gewusst
let flipped = false;

function initStack(ch){
  stack = ALL.filter(c=>c.ch===ch).map((c,i)=>({...c,id:i}));
  done = [];
  flipped = false;
}

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function showChapter(ch){
  curChapter=ch;
  initStack(ch);
  shuffle(stack);
  renderPills();
  renderCard();
}

function renderPills(){
  document.getElementById('pills').innerHTML = CHAPTERS.map(ch=>{
    const allCards = ALL.filter(c=>c.ch===ch);
    const isDone = curChapter===ch && stack.length===0 && done.length===allCards.length;
    const isActive = ch===curChapter;
    let cls='pill'+(isActive?' active':'')+(isDone?' done':'');
    return `<button class="${cls}" onclick="showChapter('${ch}')">${ch}</button>`;
  }).join('');
}

function renderCard(){
  const area = document.getElementById('cardArea');
  const info = document.getElementById('stackInfo');

  if(stack.length===0){
    info.innerHTML = '';
    area.innerHTML = `
      <div class="done-screen">
        <div class="done-title">Kapitel gemeistert ✓</div>
        <div class="done-sub">Alle Karten gewusst.<br>Wähle das nächste Kapitel oben.</div>
        <button class="btn-restart" onclick="showChapter('${curChapter}')">Nochmal</button>
      </div>`;
    renderPills();
    return;
  }

  const remaining = stack.length;
  const total = ALL.filter(c=>c.ch===curChapter).length;
  info.innerHTML = `Noch <span>${remaining}</span> von <span>${total}</span> Karten im Stapel`;

  const card = stack[0];
  area.innerHTML = `
    <div class="flashcard-wrap" onclick="doFlip()">
      <div class="flashcard-inner${flipped?' flipped':''}" id="fi">
        <div class="face face-front">
          <div class="card-label">Frage</div>
          <div class="card-q">${card.q}</div>
          <div class="card-hint">Antippen zum Aufdecken</div>
        </div>
        <div class="face face-back">
          <div class="card-label">Antwort</div>
          <div class="card-a">${card.a}</div>
        </div>
      </div>
    </div>
    ${flipped ? `
    <div class="btn-row">
      <button class="btn-wrong" onclick="markWrong()">✗ Noch nicht gewusst</button>
      <button class="btn-right" onclick="markRight()">✓ Gewusst</button>
    </div>` : `
    <button class="btn-flip" onclick="doFlip()">Antwort aufdecken</button>
    `}`;
}

function doFlip(){
  if(flipped) return;
  flipped=true;
  document.getElementById('fi').classList.add('flipped');
  setTimeout(renderCard, 520);
}

function markRight(){
  done.push(stack.shift());
  flipped=false;
  renderCard();
}

function markWrong(){
  const card = stack.shift();
  // ans Ende des Stapels
  stack.push(card);
  flipped=false;
  renderCard();
}

// Print
window.addEventListener('beforeprint',()=>{
  const el = document.getElementById('printContent');
  el.style.display='block';
  el.innerHTML = CHAPTERS.map(ch=>`
    <div class="print-ch">
      <div class="print-ch-title">${ch}</div>
      ${ALL.filter(c=>c.ch===ch).map(c=>`
        <div class="print-card">
          <div class="pq">F: ${c.q}</div>
          <div class="pa">A: ${c.a}</div>
        </div>`).join('')}
    </div>`).join('');
});
window.addEventListener('afterprint',()=>{
  document.getElementById('printContent').style.display='none';
});

showChapter(CHAPTERS[0]);
</script>
</body>
</html>
